<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>FF&amp;E Builder</title>
    <!--
      Single Page Apps for GitHub Pages — redirect script
      MIT License — https://github.com/rafgraph/spa-github-pages

      GitHub Pages serves this 404.html when a route is not found.
      This script encodes the URL path into a query-string parameter and
      redirects to the root index.html, which then decodes it back via
      history.replaceState so React Router sees the correct location.

      pathSegmentsToKeep = 1 because this is a project page (/ff-e-builder/).
    -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.host +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
