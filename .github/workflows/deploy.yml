name: Deploy to GitHub Pages

# Only runs on pushes to main (after CI passes).
on:
  push:
    branches: [main]

# Required by the modern GitHub Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; do not cancel in-progress deployments.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # The SPA redirect approach for GitHub Pages client-side routing:
      #   • public/404.html (redirect script) is copied to dist/ by Vite during build.
      #   • index.html (decode script) is already in dist/.
      # When GitHub Pages serves 404.html for an unknown path, the redirect script
      # encodes the URL and sends the browser to the root. The decode script in
      # index.html then restores the original path via history.replaceState so
      # React Router renders the correct component.
      #
      # No extra step needed — public/404.html flows through the Vite build automatically.
      # See: https://github.com/rafgraph/spa-github-pages

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
